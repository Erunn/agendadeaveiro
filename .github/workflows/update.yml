name: Update Aveiro Events
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows manual update
jobs:
  build:
    runs-on: ubuntu-latest
    # This tells GitHub to use the newer Node.js engine now
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4 # Latest version
      - name: Set up Python
        uses: actions/setup-python@v5 # Latest version
        with:
          python-version: '3.11' # A newer, faster Python version
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add events.json
          git commit -m "Auto-update agenda data" || exit 0
          git push
