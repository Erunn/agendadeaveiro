<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aveiro Events Meta-Search</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        
        /* LAYOUT REORGANIZADO */
        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { 
            width: 220px; 
            background: white; 
            padding: 30px 20px; 
            border-right: 1px solid #ddd; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
        }

        .calendar-section { flex: 1; padding: 20px; overflow-y: auto; background: #f4f7f6; }

        .filter-group { display: flex; flex-direction: column; gap: 12px; }
        .filter-item { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 15px; font-weight: 600; }
        
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 10px; }
        input[type="checkbox"] { transform: scale(1.2); }

        /* --- CORES DE EVENTOS --- */
        .event-teatro { background-color: #ffcc80 !important; border-left: 5px solid #e67e22 !important; }
        .event-cinema { background-color: #90caf9 !important; border-left: 5px solid #1e88e5 !important; }
        .event-cma    { background-color: #a5d6a7 !important; border-left: 5px solid #2e7d32 !important; }
        .event-viral  { background-color: #ce93d8 !important; border-left: 5px solid #7b1fa2 !important; }

        /* --- CENTRAMENTO E ALINHAMENTO --- */
        .fc-event { border: none !important; margin-bottom: 4px !important; }
        
        .fc-event-main {
            display: grid !important;
            grid-template-columns: 60px 1fr !important; /* Espaço maior entre hora e texto */
            align-items: center !important; /* CENTRAMENTO VERTICAL */
            padding: 8px !important;
            min-height: 50px;
        }

        .fc-event-time { 
            font-weight: bold !important; 
            font-size: 0.9em !important; 
            color: #000 !important;
            text-align: center !important;
        }

        .fc-event-title {
            color: #000 !important;
            font-size: 0.85em !important;
            line-height: 1.4 !important;
            padding-left: 5px; /* Mais espaço após a hora */
        }

        /* --- RESET DO LOOK DA LISTA (VOLTANDO ATRÁS) --- */
        .fc-list-event { background-color: transparent !important; }
        .fc-list-event-title { padding: 12px !important; }
        .fc-list-day-side-text { display: block !important; } /* Reverte a remoção do dia da semana */

        /* TOOLBAR À ESQUERDA */
        .fc-header-toolbar { 
            display: flex !important; 
            justify-content: flex-start !important; 
            gap: 20px !important;
            margin-bottom: 20px !important;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="sidebar">
            <h1>Explorar Aveiro</h1>
            <div class="filter-group" id="sourceFilters">
                <label class="filter-item" style="color: #e67e22"><input type="checkbox" checked value="teatro"> Teatro</label>
                <label class="filter-item" style="color: #3498db"><input type="checkbox" checked value="cinema"> Cinema</label>
                <label class="filter-item" style="color: #27ae60"><input type="checkbox" checked value="cma"> Município</label>
                <label class="filter-item" style="color: #8e44ad"><input type="checkbox" checked value="viral"> Viral Agenda</label>
            </div>
        </div>

        <div class="calendar-section">
            <div id='calendar'></div>
        </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var allEvents = [];

        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'pt',
          firstDay: 1, 
          height: 'auto',
          headerToolbar: { 
            left: 'prev,next today month,listMonth', // Tudo à esquerda
            center: 'title', 
            right: '' 
          },
          displayEventTime: true,
          eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
          
          // PERMITE HTML NO TÍTULO (Para o negrito do Scraper funcionar)
          eventContent: function(arg) {
            let timeText = arg.timeText ? '<div class="fc-event-time">' + arg.timeText + '</div>' : '<div class="fc-event-time">all-day</div>';
            return { 
              html: timeText + '<div class="fc-event-title">' + arg.event.title + '</div>' 
            };
          },

          eventClassNames: function(arg) {
            return [ 'event-' + arg.event.extendedProps.source ];
          },

          eventClick: function(info) { 
            if(info.event.url) {
                window.open(info.event.url, "_blank"); 
                info.jsEvent.preventDefault(); 
            }
          }
        });

        fetch('events.json?t=' + new Date().getTime())
          .then(res => res.json())
          .then(data => {
            allEvents = data;
            updateCalendar();
          });

        function updateCalendar() {
          const activeSources = Array.from(document.querySelectorAll('#sourceFilters input:checked')).map(el => el.value);
          const filtered = allEvents.filter(ev => activeSources.includes(ev.source));
          calendar.removeAllEvents();
          calendar.addEventSource(filtered);
          calendar.render();
        }

        document.querySelectorAll('#sourceFilters input').forEach(input => {
          input.addEventListener('change', updateCalendar);
        });
      });
    </script>
</body>
</html>
