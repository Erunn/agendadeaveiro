<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Aveiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --sidebar-bg: #F4F0EC; --main-bg: #F4F0EC; --text-color: #111111;
            --teatro-color: #FF4500; --cinema-color: #0047FF; --23milhas-color: #FF007F;
            --card-border: 2px solid var(--text-color);
        }
        body { margin: 0; font-family: 'Space Grotesk', sans-serif; background: var(--main-bg); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; padding: 25px; border-right: 3px solid var(--text-color); overflow-y: auto; flex-shrink: 0; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .calendar-section { flex: 1; padding: 30px; overflow-y: auto; }

        /* GRELHA EDITORIAL */
        .daily-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; grid-auto-rows: 140px; margin-bottom: 30px; }

        .event-card {
            display: flex; background: #fff; border: var(--card-border);
            box-shadow: 5px 5px 0px var(--text-color); text-decoration: none; color: inherit;
            height: 100%; transition: transform 0.1s;
        }
        .event-card:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--text-color); }

        /* IMAGENS */
        .card-img-wrap { width: 160px; flex-shrink: 0; border-right: 2px solid var(--text-color); overflow: hidden; background: #000; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Cinema: Ajuste para não cortar posters verticais */
        .event-cinema .card-img { object-fit: contain; }
        .event-cinema .card-img-wrap { width: 95px; }

        /* Cartão de Row Inteira (span-12) */
        .span-12 .card-img-wrap { width: 300px; } 

        /* Info */
        .card-info { padding: 15px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .card-title { font-weight: 700; font-size: 1.1rem; margin: 5px 0; text-transform: uppercase; line-height: 1.1; }
        .card-umbrella { font-size: 0.75rem; border: 1px solid #111; padding: 2px 6px; width: fit-content; margin-bottom: 5px; }

        /* Grid Spans */
        .span-12 { grid-column: span 12; }
        .span-6 { grid-column: span 6; }
        .span-3 { grid-column: span 3; }
        .row-span-2 { grid-row: span 2; }
        .row-span-2 .card-img-wrap { width: 45%; }
        .row-span-2.event-cinema .card-img-wrap { width: 195px; } /* Proporção poster destaque */

        @media (max-width: 900px) { .span-3, .span-6, .span-12 { grid-column: span 12; } .row-span-2 { grid-row: span 1; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>AGENDA<br>AVEIRO</h2>
        <div id="filter-locations">
            <label><input type="checkbox" checked value="teatro"> Teatro Aveirense</label><br>
            <label><input type="checkbox" checked value="cinema"> Cinema Glicínias</label><br>
            <label><input type="checkbox" checked value="23milhas"> 23 Milhas</label>
        </div>
    </div>
    <div class="main-wrapper">
        <div class="calendar-section" id="scroll-container"><div id='calendar'></div></div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView: 'listYear', locale: 'pt',
          dayHeaderContent: (arg) => {
              return { html: `<div style="padding:10px 0; border-bottom:2px solid #000; font-size:1.2rem; font-weight:800; text-transform:uppercase;">${arg.date.toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long' })}</div>` };
          },
          eventContent: function(arg) {
            let events = arg.event.extendedProps.daily_events;
            if (!events) return;

            // Ordenar por LOCAL (para agrupar) e depois HORA
            events.sort((a, b) => a.source.localeCompare(b.source) || a.start.localeCompare(b.start));

            let html = '<div class="daily-grid">';
            let total = events.length;

            if (total === 1) {
                html += createCard(events[0], 'span-12');
            } else if (total === 2) {
                events.forEach(e => html += createCard(e, 'span-6'));
            } else if (total === 5) {
                // Layout Clássico 1 Grande + 4 Pequenos
                html += createCard(events[0], 'span-6 row-span-2');
                events.slice(1).forEach(e => html += createCard(e, 'span-3'));
            } else if (total === 6) {
                // Layout 4 pequenos + 2 grandes (Regressão corrigida)
                events.slice(0, 4).forEach(e => html += createCard(e, 'span-3'));
                events.slice(4).forEach(e => html += createCard(e, 'span-6'));
            } else {
                // Fallback dinâmico
                events.forEach((e, i) => html += createCard(e, total > 3 ? 'span-3' : 'span-4'));
            }
            
            html += '</div>';
            return { html: html };
          }
        });

        function createCard(e, cls) {
            let p = e.extendedProps;
            let color = `var(--${e.source}-color)`;
            return `
                <a href="${e.url}" target="_blank" class="event-card ${cls} event-${e.source}" style="border-left: 12px solid ${color}">
                    <div class="card-img-wrap"><img src="${p.image}" class="card-img"></div>
                    <div class="card-info">
                        ${p.umbrella ? `<div class="card-umbrella">${p.umbrella}</div>` : ''}
                        <div class="card-title">${e.title}</div>
                        <div style="font-size:0.9rem; font-weight:600; opacity:0.6;">${p.display_time}</div>
                    </div>
                </a>`;
        }

        fetch('events.json').then(res => res.json()).then(data => {
            let grouped = {};
            data.forEach(ev => {
                let d = ev.start.split('T')[0];
                if(!grouped[d]) grouped[d] = [];
                grouped[d].push(ev);
            });
            let final = Object.keys(grouped).map(d => ({ start: d, extendedProps: { daily_events: grouped[d] } }));
            calendar.addEventSource(final);
            calendar.render();
        });
      });
    </script>
</body>
</html>
