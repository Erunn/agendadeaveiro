<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aveiro Events Meta-Search</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --sidebar-bg: #009a61;
            --main-bg: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --border-color: #ddd;
        }

        [data-theme="dark"] {
            --main-bg: #1a1d21;
            --text-color: #e1e1e1;
            --card-bg: #24282d;
            --border-color: #383f47;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--main-bg); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; color: white; z-index: 10; }
        .calendar-section { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .filter-item { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        
        /* DARK MODE TOGGLE */
        .theme-switch-wrapper { position: absolute; top: 25px; right: 25px; z-index: 100; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 44px; }
        .theme-switch input { display:none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 16px; left: 4px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: #222; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- CALENDÁRIO --- */
        #calendar { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        
        /* EVENTOS (GRID) */
        .fc-event { 
            border: none !important; 
            border-radius: 6px !important; 
            cursor: pointer; 
            transition: transform 0.2s; 
            opacity: 1 !important;
            overflow: hidden; /* Garante que nada sai da célula */
        }
        .fc-event:hover { transform: translateY(-2px); z-index: 5; }
        
        .event-teatro { background: #ffcc80 !important; border-left: 5px solid #e67e22 !important; }
        .event-cinema { background: #90caf9 !important; border-left: 5px solid #1e88e5 !important; }
        .event-cma    { background: #a5d6a7 !important; border-left: 5px solid #2e7d32 !important; }
        .event-viral  { background: #ce93d8 !important; border-left: 5px solid #7b1fa2 !important; }

        .fc-event-main { 
            display: grid !important; 
            grid-template-columns: 55px 1fr !important; 
            align-items: center; 
            padding: 8px !important; 
            min-height: 45px;
            white-space: normal !important; /* CORREÇÃO: Permite quebra de linha */
            word-break: break-word; /* CORREÇÃO: Parte palavras se necessário */
        }

        .fc-event-time { font-weight: bold; color: #000 !important; text-align: center; font-size: 0.85em; }
        .fc-event-title { 
            color: #000 !important; 
            font-size: 0.85em; 
            font-weight: normal !important; 
            padding-left: 8px;
        }

        /* --- MODO LISTA --- */
        .fc-list-event { cursor: pointer !important; }
        .fc-list-event-dot, .fc-list-event-time { display: none !important; } 
        
        /* Adicionamos pointer-events: none no container interno para o clique passar para a linha pai */
        .list-row-container { 
            display: flex; 
            align-items: stretch; 
            width: 100%; 
            min-height: 110px; 
            pointer-events: none; 
        }
        
        .list-time-box { 
            width: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 1.1em; 
            color: #000;
            border-right: 1px solid rgba(0,0,0,0.1);
        }
        .list-img { width: 160px; height: 100px; object-fit: cover; border-radius: 8px; margin: auto 20px; }
        .list-info { flex: 1; display: flex; flex-direction: column; justify-content: center; color: #000; padding-right: 10px; }

        .fc-list-event.event-teatro { background-color: #ffcc80 !important; }
        .fc-list-event.event-cinema { background-color: #90caf9 !important; }
        .fc-list-event.event-cma    { background-color: #a5d6a7 !important; }
        .fc-list-event.event-viral  { background-color: #ce93d8 !important; }

        /* Ajuste para que a linha da lista ocupe o clique */
        .fc-list-event-title { padding: 0 !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>AGENDA AVEIRO</h1>
        <div class="filter-group" id="sourceFilters">
            <label class="filter-item"><input type="checkbox" checked value="teatro"> Teatro</label>
            <label class="filter-item"><input type="checkbox" checked value="cinema"> Cinema</label>
            <label class="filter-item"><input type="checkbox" checked value="cma"> Município</label>
            <label class="filter-item"><input type="checkbox" checked value="viral"> Viral Agenda</label>
        </div>
    </div>

    <div class="calendar-section">
        <div class="theme-switch-wrapper">
            <label class="theme-switch"><input type="checkbox" id="themeToggle"><div class="slider"></div></label>
        </div>
        <div id='calendar'></div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('change', () => {
            document.documentElement.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
            calendar.render();
        });

        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'pt',
          firstDay: 1, 
          dayMaxEventRows: true, // Garante que o calendário não quebre se houver muitos eventos
          headerToolbar: { 
            left: 'prev,next today dayGridMonth,listMonth', 
            center: 'title', 
            right: '' 
          },
          buttonText: { dayGridMonth: 'Calendário', listMonth: 'Lista', today: 'Hoje' },
          
          eventContent: function(arg) {
            let timeText = 'all-day';
            if (arg.event.start) {
                let date = arg.event.start;
                if (date.getHours() !== 0 || date.getMinutes() !== 0) {
                    timeText = date.getHours().toString().padStart(2, '0') + ':' + 
                               date.getMinutes().toString().padStart(2, '0');
                }
            }

            let imgUrl = arg.event.extendedProps.image;

            if (arg.view.type === 'listMonth') {
                return { 
                  html: `<div class="list-row-container">
                            <div class="list-time-box">${timeText}</div>
                            <img src="${imgUrl || ''}" class="list-img" style="${imgUrl ? '' : 'display:none'}">
                            <div class="list-info">${arg.event.title}</div>
                         </div>` 
                };
            }
            // Modo Calendário
            return { 
              html: `<div class="fc-event-main">
                        <div class="fc-event-time">${timeText}</div>
                        <div class="fc-event-title">${arg.event.title}</div>
                     </div>` 
            };
          },
          eventClassNames: function(arg) { return [ 'event-' + arg.event.extendedProps.source ]; },
          
          // Função de clique centralizada para ambos os modos
          eventClick: function(info) { 
            if(info.event.url) {
                window.open(info.event.url, "_blank"); 
                info.jsEvent.preventDefault(); 
            }
          }
        });

        fetch('events.json?t=' + new Date().getTime())
          .then(res => res.json())
          .then(data => {
            window.allEvents = data;
            updateCalendar();
          });

        window.updateCalendar = function() {
          const activeSources = Array.from(document.querySelectorAll('#sourceFilters input:checked')).map(el => el.value);
          const filtered = window.allEvents.filter(ev => activeSources.includes(ev.source));
          calendar.removeAllEvents();
          calendar.addEventSource(filtered);
          calendar.render();
        };

        document.querySelectorAll('#sourceFilters input').forEach(input => {
          input.addEventListener('change', window.updateCalendar);
        });
      });
    </script>
</body>
</html>
