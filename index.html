<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aveiro Events Meta-Search</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --sidebar-bg: #009a61;
            --main-bg: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --teatro-color: #e67e22;
            --cinema-color: #1e88e5;
            --cma-color: #2e7d32;
            --viral-color: #7b1fa2;
        }

        [data-theme="dark"] {
            --main-bg: #111827;
            --text-color: #f3f4f6;
            --card-bg: #1f2937;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--main-bg); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; transition: background 0.3s; }
        
        .sidebar { width: 240px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; color: white; z-index: 200; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .calendar-section { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        
        .filter-group { display: flex; flex-direction: column; gap: 12px; }
        .filter-item { 
            display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: 600; 
            padding: 10px 15px; border-radius: 8px; background: rgba(255,255,255,0.1); transition: all 0.2s; border-left: 4px solid transparent;
        }
        .filter-teatro { border-left-color: var(--teatro-color) !important; }
        .filter-cinema { border-left-color: var(--cinema-color) !important; }
        .filter-cma    { border-left-color: var(--cma-color) !important; }
        .filter-viral  { border-left-color: var(--viral-color) !important; }
        .filter-item:hover { background: rgba(255,255,255,0.2); }

        .theme-switch-wrapper { position: absolute; top: 25px; right: 25px; z-index: 200; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 44px; }
        .theme-switch input { display:none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 16px; left: 4px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: #222; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- HEADER FIXO E DESIGN DA TOOLBAR --- */
        .fc-header-toolbar { 
            position: sticky; 
            top: -25px; /* Compensa o padding da secção */
            background: var(--main-bg); 
            z-index: 100; 
            padding: 20px 0; 
            margin: 0 0 10px 0 !important; 
        }
        .fc-toolbar-chunk { display: flex; align-items: center; }
        .fc-toolbar-title { font-size: 1.3rem !important; margin: 0 15px !important; text-transform: lowercase; font-weight: 600; }

        /* Estilo dos Botões */
        .fc-button { background: var(--card-bg) !important; color: var(--text-color) !important; border: none !important; box-shadow: 0 2px 8px rgba(0,0,0,0.05) !important; font-weight: 600 !important; text-transform: capitalize !important; }
        .fc-button-active { background: var(--sidebar-bg) !important; color: white !important; }
        .fc-prev-button, .fc-next-button { padding: 8px 12px !important; }

        /* --- CALENDÁRIO ULTRA MINIMALISTA --- */
        #calendar { background: transparent; padding: 0; border: none; }
        
        /* Removemos todas as bordas cinzentas da grelha! */
        .fc-theme-standard td, .fc-theme-standard th { border-color: transparent !important; border: none !important; }
        .fc-scrollgrid { border: none !important; }
        .fc-daygrid-day-frame { min-height: 100px !important; padding: 5px; }
        .fc-col-header-cell { padding-bottom: 10px; font-weight: 600; color: #888; text-transform: lowercase; }

        .fc-event { border: none !important; border-radius: 8px !important; cursor: pointer; overflow: hidden; margin: 3px 0 !important; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .event-teatro { background: rgba(230, 126, 34, 0.08) !important; border-left: 4px solid var(--teatro-color) !important; }
        .event-cinema { background: rgba(30, 136, 229, 0.08) !important; border-left: 4px solid var(--cinema-color) !important; }
        .event-cma    { background: rgba(46, 125, 50, 0.08) !important; border-left: 4px solid var(--cma-color) !important; }
        .event-viral  { background: rgba(123, 31, 162, 0.08) !important; border-left: 4px solid var(--viral-color) !important; }

        .fc-event-main { display: flex !important; align-items: flex-start; gap: 6px; padding: 6px 8px !important; white-space: normal !important; word-break: break-word; }
        .fc-event-time { font-weight: 700; color: var(--text-color) !important; font-size: 0.8em; white-space: nowrap !important; flex-shrink: 0; }
        .fc-event-title { color: var(--text-color) !important; font-size: 0.85em; font-weight: normal !important; line-height: 1.3; }

        /* --- MODO LISTA CONTÍNUA E MINIMALISTA --- */
        .fc-list-event-graphic, .fc-list-event-time { display: none !important; } 
        .fc-list-event-title { padding: 0 !important; border: none !important; background: transparent !important; }
        .fc-list-table { border-collapse: separate !important; border-spacing: 0 !important; } 
        .fc-list-event { background: transparent !important; }
        .fc-list-event td { border: none !important; padding: 0 0 20px 0 !important; background: transparent !important; }
        
        /* O Cartão Minimalista (sem bordas, apenas sombra) */
        .list-card { 
            display: flex; align-items: stretch; background: var(--card-bg); border-radius: 12px; min-height: 130px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: none; transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden; pointer-events: auto; border-left-width: 8px !important; border-left-style: solid;
        }
        .list-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
        
        .list-time-box { width: 90px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1em; color: var(--text-color); border-right: 1px solid rgba(0,0,0,0.05); flex-shrink: 0; }
        [data-theme="dark"] .list-time-box { border-right: 1px solid rgba(255,255,255,0.05); }
        .list-img { width: 180px; height: 130px; object-fit: cover; flex-shrink: 0; margin: auto 15px auto 0; border-radius: 0 8px 8px 0; }
        .list-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 15px 20px 15px 0; color: var(--text-color); }

        .list-meta { font-size: 0.85em; color: #888; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .list-meta span { color: var(--text-color); }
        .list-title { font-size: 1.1em; line-height: 1.3; margin-bottom: 5px; }
        .list-title b { display: block; font-size: 0.9em; margin-bottom: 3px; color: var(--sidebar-bg); }
        
        .list-desc { font-size: 0.85em; color: #6b7280; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        [data-theme="dark"] .list-desc, [data-theme="dark"] .list-meta { color: #9ca3af; }

        /* Títulos dos dias na Lista */
        .fc-list-day-cushion { background: transparent !important; padding: 25px 0 10px 5px !important; font-size: 1.1em; font-weight: 600; border: none !important; color: var(--text-color) !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>AGENDA AVEIRO</h1>
        <div class="filter-group" id="sourceFilters">
            <label class="filter-item filter-teatro"><input type="checkbox" checked value="teatro"> Teatro</label>
            <label class="filter-item filter-cinema"><input type="checkbox" checked value="cinema"> Cinema</label>
            <label class="filter-item filter-cma"><input type="checkbox" checked value="cma"> Município</label>
            <label class="filter-item filter-viral"><input type="checkbox" checked value="viral"> Viral Agenda</label>
        </div>
    </div>

    <div class="calendar-section">
        <div class="theme-switch-wrapper">
            <label class="theme-switch"><input type="checkbox" id="themeToggle"><div class="slider"></div></label>
        </div>
        <div id='calendar'></div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        window.allEvents = [];

        function navigateListMonth(direction) {
            const scroller = document.querySelector('.fc-scroller');
            if (!scroller) return;
            const dayHeaders = Array.from(document.querySelectorAll('.fc-list-day'));
            if (dayHeaders.length === 0) return;
            
            const scrollerTop = scroller.getBoundingClientRect().top;
            let currentHeader = dayHeaders[0];
            for (let header of dayHeaders) {
                if (header.getBoundingClientRect().top >= scrollerTop - 50) {
                    currentHeader = header;
                    break;
                }
            }
            
            let currentDate = new Date(currentHeader.getAttribute('data-date'));
            let targetDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + direction, 1);
            let targetYYYYMM = targetDate.getFullYear() + '-' + String(targetDate.getMonth() + 1).padStart(2, '0');
            
            let targetHeader = null;
            if (direction === 1) { 
                targetHeader = dayHeaders.find(h => h.getAttribute('data-date') >= targetYYYYMM + '-01');
            } else { 
                let currentYYYYMM = currentDate.getFullYear() + '-' + String(currentDate.getMonth() + 1).padStart(2, '0');
                let reversed = [...dayHeaders].reverse();
                let lastOfPrevMonth = reversed.find(h => h.getAttribute('data-date') < currentYYYYMM + '-01');
                if (lastOfPrevMonth) {
                    let prevYYYYMM = lastOfPrevMonth.getAttribute('data-date').substring(0, 7);
                    targetHeader = dayHeaders.find(h => h.getAttribute('data-date').startsWith(prevYYYYMM));
                }
            }
            
            if (targetHeader) {
                // Scroll suave considerando o header fixo
                const y = targetHeader.getBoundingClientRect().top + scroller.scrollTop - 90;
                scroller.scrollTo({top: y, behavior: 'smooth'});
            }
        }

        window.calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'listYear', 
          locale: 'pt',
          firstDay: 1, 
          dayMaxEvents: 4, 
          fixedWeekCount: false, 
          height: 'auto',
          
          customButtons: {
            customPrev: {
                icon: 'chevron-left',
                click: function() {
                    if (window.calendar.view.type === 'listYear') navigateListMonth(-1);
                    else window.calendar.prev();
                }
            },
            customNext: {
                icon: 'chevron-right',
                click: function() {
                    if (window.calendar.view.type === 'listYear') navigateListMonth(1);
                    else window.calendar.next();
                }
            },
            customToday: {
                text: 'Hoje',
                click: function() {
                    window.calendar.today();
                    if (window.calendar.view.type === 'listYear') {
                        setTimeout(() => {
                            const scroller = document.querySelector('.fc-scroller');
                            let todayStr = new Date().toISOString().split('T')[0];
                            let headers = Array.from(document.querySelectorAll('.fc-list-day'));
                            let target = headers.find(h => h.getAttribute('data-date') >= todayStr) || headers[headers.length-1];
                            if (target && scroller) {
                                const y = target.getBoundingClientRect().top + scroller.scrollTop - 90;
                                scroller.scrollTo({top: y, behavior: 'smooth'});
                            }
                        }, 100);
                    }
                }
            }
          },

          // TÍTULO ENTRE AS SETAS!
          headerToolbar: { 
            left: 'customPrev,title,customNext',
            center: '', 
            right: 'customToday listYear,dayGridMonth' 
          },
          buttonText: { dayGridMonth: 'Calendário', listYear: 'Lista' }, 
          
          eventContent: function(arg) {
            let timeText = 'Todo dia'; 
            if (arg.event.start && (arg.event.start.getHours() !== 0 || arg.event.start.getMinutes() !== 0)) {
                timeText = arg.event.start.getHours().toString().padStart(2, '0') + ':' + 
                           arg.event.start.getMinutes().toString().padStart(2, '0');
            }

            let imgUrl = arg.event.extendedProps.image;
            let descText = arg.event.extendedProps.description;
            let catText = arg.event.extendedProps.category || 'Vários';
            
            let sourceColor = '#ccc';
            if(arg.event.extendedProps.source === 'teatro') sourceColor = 'var(--teatro-color)';
            if(arg.event.extendedProps.source === 'cinema') sourceColor = 'var(--cinema-color)';
            if(arg.event.extendedProps.source === 'cma') sourceColor = 'var(--cma-color)';
            if(arg.event.extendedProps.source === 'viral') sourceColor = 'var(--viral-color)';

            if (arg.view.type === 'listYear') {
                let descHtml = descText ? `<div class="list-desc">${descText}</div>` : '';
                return { 
                  html: `<div class="list-card" style="border-left-color: ${sourceColor} !important" onclick="window.open('${arg.event.url}', '_blank')">
                            <div class="list-time-box">${timeText}</div>
                            <img src="${imgUrl || ''}" class="list-img" style="${imgUrl ? '' : 'display:none'}">
                            <div class="list-info">
                                <div class="list-meta"><span>${catText}</span></div>
                                <div class="list-title">${arg.event.title}</div>
                                ${descHtml}
                            </div>
                         </div>` 
                };
            }
            return { 
              html: `<div class="fc-event-main">
                        <div class="fc-event-time">${timeText}</div>
                        <div class="fc-event-title">${arg.event.title}</div>
                     </div>` 
            };
          },
          eventClassNames: function(arg) { return [ 'event-' + arg.event.extendedProps.source ]; },
          eventClick: function(info) { 
            if(info.event.url && info.view.type !== 'listYear') {
                window.open(info.event.url, "_blank"); 
                info.jsEvent.preventDefault(); 
            }
          }
        });

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('change', () => {
            document.documentElement.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
            window.calendar.render();
        });

        fetch('events.json?t=' + new Date().getTime())
          .then(res => res.json())
          .then(data => {
            window.allEvents = data;
            if(data.length > 0) {
                let minDateStr = data.reduce((min, ev) => (ev.start < min ? ev.start : min), data[0].start);
                let maxDateStr = data.reduce((max, ev) => (ev.start > max ? ev.start : max), data[0].start);
                let maxDateObj = new Date(maxDateStr.split('T')[0]);
                maxDateObj.setDate(maxDateObj.getDate() + 1);
                
                // ESCONDE O PASSADO E O FUTURO SEM EVENTOS
                window.calendar.setOption('validRange', { 
                    start: minDateStr.split('T')[0],
                    end: maxDateObj.toISOString().split('T')[0]
                });
                window.calendar.gotoDate(minDateStr.split('T')[0]);
            }
            updateCalendar();
          })

        window.updateCalendar = function() {
          const activeSources = Array.from(document.querySelectorAll('#sourceFilters input:checked')).map(el => el.value);
          const filtered = window.allEvents.filter(ev => activeSources.includes(ev.source));
          window.calendar.removeAllEvents();
          window.calendar.addEventSource(filtered);
          window.calendar.render();
        };

        document.querySelectorAll('#sourceFilters input').forEach(input => {
          input.addEventListener('change', window.updateCalendar);
        });
      });
    </script>
</body>
</html>
