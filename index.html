<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aveiro Events Meta-Search</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --sidebar-bg: #009a61;
            --main-bg: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --border-color: #ddd;
        }

        [data-theme="dark"] {
            --main-bg: #1a1d21;
            --text-color: #e1e1e1;
            --card-bg: #24282d;
            --border-color: #383f47;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--main-bg); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; transition: background 0.3s; }
        
        /* SIDEBAR */
        .sidebar { width: 240px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; color: white; z-index: 10; }
        .calendar-section { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .filter-item { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; margin-bottom: 10px; transition: background 0.2s; }
        .filter-item:hover { background: rgba(255,255,255,0.2); }
        
        /* DARK MODE TOGGLE */
        .theme-switch-wrapper { position: absolute; top: 25px; right: 25px; z-index: 100; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 44px; }
        .theme-switch input { display:none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 16px; left: 4px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: #222; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- CALENDÁRIO --- */
        #calendar { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .fc-toolbar { margin-bottom: 20px !important; display: flex; justify-content: flex-start !important; gap: 15px; }

        .fc-event { 
            border: none !important; 
            border-radius: 6px !important; 
            cursor: pointer; 
            transition: transform 0.2s; 
            opacity: 1 !important; 
            overflow: hidden; 
        }
        .fc-event:hover { transform: translateY(-2px); z-index: 5; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .event-teatro { background: #ffcc80 !important; border-left: 5px solid #e67e22 !important; }
        .event-cinema { background: #90caf9 !important; border-left: 5px solid #1e88e5 !important; }
        .event-cma    { background: #a5d6a7 !important; border-left: 5px solid #2e7d32 !important; }
        .event-viral  { background: #ce93d8 !important; border-left: 5px solid #7b1fa2 !important; }

        /* CORREÇÃO DO EVENTO E DO "ALL-DAY" VERTICAL */
        .fc-event-main { 
            display: flex !important;
            align-items: center;
            gap: 8px;
            padding: 6px 8px !important; 
            white-space: normal !important; 
            word-break: break-word;
        }

        .fc-event-time { 
            font-weight: bold; 
            color: #000 !important; 
            font-size: 0.85em; 
            white-space: nowrap !important;
            flex-shrink: 0; 
        }
        
        .fc-event-title { 
            color: #000 !important; 
            font-size: 0.85em; 
            font-weight: normal !important; 
            line-height: 1.3;
        }

        /* --- MODO LISTA --- */
        .fc-list-event { cursor: pointer !important; position: relative; }
        .fc-list-event-dot, .fc-list-event-time { display: none !important; } 
        
        /* CORREÇÃO DA SEPARAÇÃO NA LISTA */
        .fc-list-table { border-collapse: collapse !important; }
        .fc-list-event td { 
            border-bottom: 12px solid var(--main-bg) !important;
            border-top: none !important;
            padding: 0 !important;
            background-clip: padding-box;
        }
        
        .list-row-container { 
            display: flex; 
            align-items: stretch; 
            width: 100%; 
            min-height: 110px; 
            pointer-events: none; 
        }
        
        .list-time-box { width: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1em; color: #000; border-right: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        .list-img { width: 160px; height: 100px; object-fit: cover; border-radius: 8px; margin: auto 20px; flex-shrink: 0; }
        .list-info { flex: 1; display: flex; flex-direction: column; justify-content: center; color: #000; padding-right: 15px; font-weight: normal; }

        .list-desc { font-size: 0.85em; color: rgba(0,0,0,0.7); margin-top: 6px; line-height: 1.4; }
        [data-theme="dark"] .list-desc { color: rgba(255,255,255,0.7); }
        .list-info b { display: block; margin-bottom: 4px; }

        .fc-list-day-cushion { background: rgba(0,0,0,0.05) !important; padding: 12px !important; }
        
        /* Cores forçadas para a lista */
        .fc-list-event.event-teatro { background-color: #ffcc80 !important; }
        .fc-list-event.event-cinema { background-color: #90caf9 !important; }
        .fc-list-event.event-cma    { background-color: #a5d6a7 !important; }
        .fc-list-event.event-viral  { background-color: #ce93d8 !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>AGENDA AVEIRO</h1>
        <div class="filter-group" id="sourceFilters">
            <label class="filter-item"><input type="checkbox" checked value="teatro"> Teatro</label>
            <label class="filter-item"><input type="checkbox" checked value="cinema"> Cinema</label>
            <label class="filter-item"><input type="checkbox" checked value="cma"> Município</label>
            <label class="filter-item"><input type="checkbox" checked value="viral"> Viral Agenda</label>
        </div>
    </div>

    <div class="calendar-section">
        <div class="theme-switch-wrapper">
            <label class="theme-switch"><input type="checkbox" id="themeToggle"><div class="slider"></div></label>
        </div>
        <div id='calendar'></div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        window.allEvents = [];

        window.calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'pt',
          firstDay: 1, 
          headerToolbar: { 
            left: 'prev,next today dayGridMonth,listMonth', 
            center: 'title', 
            right: '' 
          },
          buttonText: { dayGridMonth: 'Calendário', listMonth: 'Lista', today: 'Hoje' },
          
          eventContent: function(arg) {
            let timeText = 'all-day';
            if (arg.event.start) {
                let date = arg.event.start;
                if (date.getHours() !== 0 || date.getMinutes() !== 0) {
                    timeText = date.getHours().toString().padStart(2, '0') + ':' + 
                               date.getMinutes().toString().padStart(2, '0');
                }
            }

            let imgUrl = arg.event.extendedProps.image;
            let descText = arg.event.extendedProps.description;

            if (arg.view.type === 'listMonth') {
                let descHtml = descText ? `<div class="list-desc">${descText}</div>` : '';
                return { 
                  html: `<div class="list-row-container">
                            <div class="list-time-box">${timeText}</div>
                            <img src="${imgUrl || ''}" class="list-img" style="${imgUrl ? '' : 'display:none'}">
                            <div class="list-info">
                                <div>${arg.event.title}</div>
                                ${descHtml}
                            </div>
                         </div>` 
                };
            }
            return { 
              html: `<div class="fc-event-main">
                        <div class="fc-event-time">${timeText}</div>
                        <div class="fc-event-title">${arg.event.title}</div>
                     </div>` 
            };
          },
          eventClassNames: function(arg) { return [ 'event-' + arg.event.extendedProps.source ]; },
          eventClick: function(info) { 
            if(info.event.url) {
                window.open(info.event.url, "_blank"); 
                info.jsEvent.preventDefault(); 
            }
          }
        });

        // Toggle Dark Mode
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('change', () => {
            document.documentElement.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
            window.calendar.render();
        });

        // Buscar dados e iniciar
        fetch('events.json?t=' + new Date().getTime())
          .then(res => res.json())
          .then(data => {
            window.allEvents = data;
            
            // Lógica para saltar para o dia mais antigo e esconder o passado
            if(data.length > 0) {
                let minDateStr = data.reduce((min, ev) => (ev.start < min ? ev.start : min), data[0].start);
                let startDateOnly = minDateStr.split('T')[0];
                
                // Esconde dias antes do primeiro evento
                window.calendar.setOption('validRange', { start: startDateOnly });
                // Salta para essa data
                window.calendar.gotoDate(startDateOnly);
            }

            updateCalendar();
          })
          .catch(err => console.error("Erro a carregar eventos: ", err));

        window.updateCalendar = function() {
          const activeSources = Array.from(document.querySelectorAll('#sourceFilters input:checked')).map(el => el.value);
          const filtered = window.allEvents.filter(ev => activeSources.includes(ev.source));
          window.calendar.removeAllEvents();
          window.calendar.addEventSource(filtered);
          window.calendar.render();
        };

        document.querySelectorAll('#sourceFilters input').forEach(input => {
          input.addEventListener('change', window.updateCalendar);
        });
      });
    </script>
</body>
</html>
