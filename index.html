<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Aveiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            /* Paleta Neo-Brutalismo */
            --sidebar-bg: #F4F0EC;      /* Cor Papel/Creme */
            --main-bg: #F4F0EC;
            --text-color: #111111;      /* Preto Tinta Forte */
            --card-bg: #ffffff;
            --border-color: #111111;    /* Linhas pretas de demarcação */
            
            --teatro-color: #FF4500;    /* Laranja eléctrico retro */
            --cinema-color: #0047FF;    /* Azul puro ultramarino */
            --cma-color: #00A859;       /* Verde sintético */
            --viral-color: #9D00FF;     /* Púrpura eléctrico */
        }

        [data-theme="dark"] {
            --sidebar-bg: #111111;
            --main-bg: #111111;
            --text-color: #F4F0EC;
            --card-bg: #1A1A1A;
            --border-color: #F4F0EC;
        }

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--main-bg); 
            color: var(--text-color); 
            display: flex; height: 100vh; overflow: hidden; 
            transition: background 0.3s, color 0.3s;
        }
        
        /* --- SIDEBAR & TOGGLES --- */
        .sidebar { 
            width: 260px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; 
            flex-direction: column; gap: 30px; color: var(--text-color); z-index: 200; 
            border-right: 3px solid var(--border-color); /* Separação Brutalista */
            flex-shrink: 0; overflow-y: auto; scrollbar-width: none; 
        }
        .sidebar::-webkit-scrollbar { display: none; }
        
        .sidebar h1 { 
            font-size: 1.8rem; margin: 0; letter-spacing: -1px; text-transform: uppercase; 
            font-weight: 700; border-bottom: 4px solid var(--border-color); padding-bottom: 15px;
        }
        
        .sidebar-section h3 { 
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-color); 
            margin: 0 0 15px 0; font-weight: 700; opacity: 0.8;
        }
        
        .filter-group { display: flex; flex-direction: column; gap: 10px; }
        
        .toggle-item { 
            display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .toggle-item:hover { opacity: 0.7; }
        .toggle-item input { display: none; }
        
        /* Checkbox Retro/Quadrada */
        .toggle-switch { 
            width: 20px; height: 20px; background: transparent; border: 2px solid var(--text-color); 
            position: relative; flex-shrink: 0; transition: background 0.1s;
        }
        .toggle-switch::after { 
            content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; 
            background: transparent; transition: background 0.1s; 
        }
        /* Cor de destaque quando selecionado */
        .toggle-item input:checked + .toggle-switch::after { background: var(--text-color); }

        /* --- LAYOUT PRINCIPAL E HEADER --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .custom-header { 
            display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; 
            background: var(--main-bg); z-index: 100; border-bottom: 3px solid var(--border-color); flex-shrink: 0; 
        }
        
        .header-left, .header-right { display: flex; align-items: center; gap: 12px; width: 250px; }
        .header-right { justify-content: flex-end; }
        .header-center { display: flex; align-items: center; gap: 15px; justify-content: center; flex: 1; }
        .header-center h2 { margin: 0; font-size: 1.6rem; font-weight: 700; text-transform: uppercase; min-width: 200px; text-align: center; letter-spacing: -0.5px;}
        
        /* Botões duros e sólidos */
        .btn { 
            background: var(--card-bg); color: var(--text-color); border: 2px solid var(--text-color); 
            padding: 8px 18px; cursor: pointer; font-weight: 700; font-size: 13px; text-transform: uppercase;
            box-shadow: 3px 3px 0px var(--text-color); transition: transform 0.1s, box-shadow 0.1s; font-family: 'Space Grotesk', sans-serif;
        }
        .btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--text-color); }
        .btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--text-color); }
        .btn.active { background: var(--text-color); color: var(--main-bg); }

        /* Dark Mode Toggle Especial */
        .theme-switch-wrapper { margin-left: 15px; display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 44px; }
        .theme-switch input { display:none; }
        .slider { background-color: var(--main-bg); bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .2s; border: 2px solid var(--text-color); }
        .slider:before { background-color: var(--text-color); bottom: 2px; content: ""; height: 16px; left: 2px; position: absolute; transition: .2s; width: 16px; }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--text-color); }

        /* --- ZONA DE CONTEÚDO --- */
        .calendar-section { flex: 1; padding: 25px 40px; overflow-y: auto; scroll-behavior: smooth; }
        .fc-header-toolbar { display: none !important; } 
        #calendar { background: transparent; padding: 0; border: none; }
        .fc-view-harness, .fc-view { background: transparent !important; outline: none !important; border: none !important; }

        /* --- MODO CALENDÁRIO (GRID) --- */
        .fc-dayGridMonth-view .fc-scrollgrid { background: var(--card-bg) !important; border: 3px solid var(--border-color) !important; box-shadow: 6px 6px 0px var(--border-color); }
        .fc-theme-standard td, .fc-theme-standard th { border: 2px solid var(--border-color) !important; }
        .fc-col-header-cell { padding: 12px 0; font-weight: 700; color: var(--text-color); text-transform: uppercase; border-bottom: none !important; font-size: 0.9rem;}
        .fc-daygrid-day-frame { padding: 5px; }

        .fc-day-past, .fc-day-other, .fc-day-disabled { background-color: rgba(0,0,0,0.05) !important; }
        [data-theme="dark"] .fc-day-past, [data-theme="dark"] .fc-day-other, [data-theme="dark"] .fc-day-disabled { background-color: rgba(255,255,255,0.05) !important; }
        .fc-day-past .fc-daygrid-day-number, .fc-day-other .fc-daygrid-day-number, .fc-day-disabled .fc-daygrid-day-number { opacity: 0.3; }

        .fc-daygrid-event { border: 2px solid var(--border-color) !important; border-radius: 0 !important; cursor: pointer; margin: 2px 4px !important; padding: 3px 6px; font-size: 0.75rem; font-weight: 600; box-shadow: 2px 2px 0px var(--border-color);}
        .event-teatro { background: var(--card-bg) !important; border-left: 6px solid var(--teatro-color) !important; }
        .event-cinema { background: var(--card-bg) !important; border-left: 6px solid var(--cinema-color) !important; }
        .event-cma { background: var(--card-bg) !important; border-left: 6px solid var(--cma-color) !important; }
        .event-viral { background: var(--card-bg) !important; border-left: 6px solid var(--viral-color) !important; }

        /* --- MODO LISTA CONTÍNUA --- */
        .fc .fc-list-event-graphic, .fc .fc-list-event-time { display: none !important; }
        .fc .fc-list-table, .fc .fc-list-table td, .fc .fc-list-table th, .fc .fc-list-table tr { border: none !important; background: transparent !important; }
        .fc-theme-standard .fc-list { border: none !important; }
        .fc-theme-standard .fc-list-event:hover td { background-color: transparent !important; }
        .fc-list-table, .fc-list-table tbody, .fc-list-table tr, .fc-list-table td { display: block !important; width: 100% !important; } 
        .fc-list-event { margin-bottom: 25px !important; }
        .fc-list-event-title { padding: 0 !important; }
        .fc-list-day-cushion { padding: 0 !important; background: transparent !important;}

        .custom-day-header { display: flex; flex-direction: column; gap: 2px; padding: 20px 0 15px 0; text-align: left; }
        .custom-weekday { font-size: 0.85rem; text-transform: uppercase; color: var(--text-color); font-weight: 700; letter-spacing: 2px; opacity: 0.6;}
        .custom-date { font-size: 1.5rem; font-weight: 700; color: var(--text-color); letter-spacing: -1px; text-transform: uppercase;}

        /* --- CARTÃO BASE (BRUTALISTA) --- */
        .list-card { 
            display: flex; align-items: stretch; background: var(--card-bg); min-height: 140px; 
            border: 2px solid var(--text-color); /* Borda dura à volta de todo o cartão */
            box-shadow: 6px 6px 0px var(--text-color); /* Sombra sólida offset */
            transition: transform 0.15s, box-shadow 0.15s;
            overflow: hidden; border-left-width: 12px !important; border-left-style: solid; 
        }
        
        .list-card.clickable-card { cursor: pointer; }
        /* Animação mecânica dura */
        .list-card.clickable-card:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0px var(--text-color); }
        .list-card.clickable-card:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--text-color); }
        
        .list-time-box { 
            width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.2em; color: var(--text-color); 
            border-right: 2px solid var(--text-color); /* Divisória dura */
            flex-shrink: 0; padding: 10px; text-align: center; line-height: 1.2;
        }

        /* --- TEATRO / NORMAIS --- */
        .list-img { 
            width: 140px; align-self: stretch; object-fit: cover; flex-shrink: 0; 
            border-right: 2px solid var(--text-color); /* Limite duro da imagem */
        }
        .list-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 15px 25px; color: var(--text-color); }
        .list-meta { font-size: 0.8em; opacity: 0.6; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
        .list-title { font-size: 1.2em; line-height: 1.2; font-weight: 700; margin-bottom: 8px; text-transform: uppercase;}
        .list-desc { font-size: 0.9em; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- CINEMA (MOSAICO BRUTALISTA) --- */
        .cinema-main-card { cursor: default !important; }
        .cinema-main-card:hover { transform: none !important; box-shadow: 6px 6px 0px var(--text-color) !important; }
        
        .cinema-mosaico { 
            display: flex; flex: 1; overflow-x: auto; align-items: stretch;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .cinema-mosaico::-webkit-scrollbar { display: none; }
        
        .movie-item { 
            display: flex; flex-direction: row; align-items: stretch;
            width: 320px; flex-shrink: 0; 
            border-right: 2px solid var(--text-color); /* Separação forte entre filmes */
            text-decoration: none !important; color: inherit; transition: background 0.2s;
            height: 100%; 
        }
        .movie-item:hover { background: rgba(0,0,0,0.04); }
        [data-theme="dark"] .movie-item:hover { background: rgba(255,255,255,0.04); }
        
        .movie-poster-wrap {
            width: 140px; align-self: stretch; flex-shrink: 0; 
            border-right: 2px solid var(--text-color); overflow: hidden; height: 100%;
        }
        
        .movie-poster { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.3s ease;
        }
        
        .movie-item:hover .movie-poster { transform: scale(1.08); }
        
        .movie-details { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            padding: 15px; gap: 6px; overflow: hidden;
        }
        
        .movie-info-name { 
            font-size: 1.05em; font-weight: 700; color: var(--text-color); 
            line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .movie-info-time { font-size: 0.9em; font-weight: 600; opacity: 0.7;}
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>AGENDA<br>AVEIRO</h1>
        
        <div class="sidebar-section">
            <h3>Locais</h3>
            <div class="filter-group" id="filter-locations">
                <label class="toggle-item">Teatro Aveirense <input type="checkbox" checked value="teatro"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Cinema Glicínias <input type="checkbox" checked value="cinema"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Município <input type="checkbox" checked value="cma"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Viral Agenda <input type="checkbox" checked value="viral"><div class="toggle-switch"></div></label>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Tipo de Evento</h3>
            <div class="filter-group" id="filter-categories">
                <label class="toggle-item">Cinema <input type="checkbox" checked value="cinema"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Música <input type="checkbox" checked value="música"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Teatro <input type="checkbox" checked value="teatro"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Dança <input type="checkbox" checked value="dança"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Workshop <input type="checkbox" checked value="workshop"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Ópera <input type="checkbox" checked value="ópera"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Multidisciplinar <input type="checkbox" checked value="multidisciplinar"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Festival <input type="checkbox" checked value="festival"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Outros <input type="checkbox" checked value="outros"><div class="toggle-switch"></div></label>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="custom-header">
            <div class="header-left">
                <button class="btn active" id="btn-list" data-view="listYear">Lista</button>
                <button class="btn" id="btn-grid" data-view="dayGridMonth">Grelha</button>
            </div>
            <div class="header-center">
                <button class="btn btn-icon" id="btn-prev">&lt;</button>
                <h2 id="current-month-title">a carregar...</h2>
                <button class="btn btn-icon" id="btn-next">&gt;</button>
            </div>
            <div class="header-right">
                <button class="btn" id="btn-today">Hoje</button>
                <div class="theme-switch-wrapper">
                    <label class="theme-switch"><input type="checkbox" id="themeToggle"><div class="slider"></div></label>
                </div>
            </div>
        </div>

        <div class="calendar-section" id="scroll-container">
            <div id='calendar'></div>
        </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var scrollContainer = document.getElementById('scroll-container');
        var titleEl = document.getElementById('current-month-title');
        window.allEvents = [];
        let currentViewName = 'listYear';

        window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView: 'listYear', locale: 'pt', firstDay: 1, stickyHeaderDates: false, height: 'auto',
          datesSet: (info) => { 
              if (currentViewName === 'dayGridMonth') titleEl.innerText = info.view.title.toLowerCase();
              else updateTitleOnScroll();
          },
          dayHeaderContent: (arg) => {
              if (arg.view.type === 'listYear') {
                  let weekday = arg.date.toLocaleDateString('pt-PT', { weekday: 'long' });
                  let dayMonthYear = arg.date.toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });
                  return { html: `<div class="custom-day-header"><span class="custom-weekday">${weekday}</span><span class="custom-date">${dayMonthYear}</span></div>` };
              }
          },
          eventContent: function(arg) {
            let ep = arg.event.extendedProps;

            // --- LÓGICA CINEMA (Layout Print/Brutalista) ---
            if (ep.is_glicinias && arg.view.type === 'listYear') {
                let moviesHtml = ep.movies.map(m => `
                    <a href="${m.url}" target="_blank" class="movie-item">
                        <div class="movie-poster-wrap">
                            <img src="${m.img}" class="movie-poster">
                        </div>
                        <div class="movie-details">
                            <div class="movie-info-name">${m.titulo}</div>
                            <div class="movie-info-time">${m.horas}</div>
                        </div>
                    </a>`).join('');
                
                return { html: `
                    <div class="list-card cinema-main-card" style="border-left-color: var(--cinema-color) !important;">
                        <div class="list-time-box" style="font-size: 0.8em; text-transform: uppercase;">Cinema<br>NOS</div>
                        <div class="cinema-mosaico">${moviesHtml}</div>
                    </div>` };
            }

            // --- LÓGICA EVENTOS NORMAIS ---
            let timeText = ep.display_time ? ep.display_time.split(' / ').join('<br>') : 'Todo<br>o dia';
            let sourceColor = ep.source === 'teatro' ? 'var(--teatro-color)' : ep.source === 'cinema' ? 'var(--cinema-color)' : ep.source === 'cma' ? 'var(--cma-color)' : 'var(--viral-color)';

            if (arg.view.type === 'listYear') {
                let umbrellaHtml = ep.umbrella ? `<b style="color: var(--text-color); display: block; font-size: 0.85em; margin-bottom: 4px; text-transform: uppercase; background: var(--sidebar-bg); display: inline-block; padding: 2px 6px; border: 1px solid var(--text-color);">${ep.umbrella}</b><br>` : '';
                
                return { html: `
                    <div class="list-card clickable-card" style="border-left-color: ${sourceColor} !important" onclick="window.open('${arg.event.url}', '_blank')">
                        <div class="list-time-box">${timeText}</div>
                        ${ep.image ? `<img src="${ep.image}" class="list-img">` : ''}
                        <div class="list-info">
                            <div class="list-meta"><span>${ep.category || 'Geral'}</span></div>
                            <div class="list-title">${umbrellaHtml}${arg.event.title}</div>
                            <div class="list-desc">${ep.description || ''}</div>
                        </div>
                    </div>` };
            }
            
            return { html: `<div style="overflow:hidden;"><b>${timeText.replace('<br>', ' ')}</b> ${arg.event.title}</div>` };
          },
          eventClassNames: (arg) => ['event-' + arg.event.extendedProps.source]
        });

        function updateTitleOnScroll() {
            if(currentViewName !== 'listYear') return;
            let dayHeaders = document.querySelectorAll('.fc-list-day');
            let containerTop = scrollContainer.getBoundingClientRect().top;
            let currentEl = dayHeaders[0];
            for (let el of dayHeaders) {
                if (el.getBoundingClientRect().top <= containerTop + 100) currentEl = el;
                else break;
            }
            if(currentEl && currentEl.getAttribute('data-date')) {
                titleEl.innerText = new Date(currentEl.getAttribute('data-date')).toLocaleString('pt-PT', { month: 'long', year: 'numeric' });
            }
        }
        scrollContainer.addEventListener('scroll', updateTitleOnScroll);

        function navigateListMonth(direction) {
            let dayHeaders = Array.from(document.querySelectorAll('.fc-list-day'));
            if (!dayHeaders.length) return;
            
            let containerTop = scrollContainer.getBoundingClientRect().top;
            let currentEl = dayHeaders[0];
            for (let el of dayHeaders) {
                if (el.getBoundingClientRect().top <= containerTop + 100) currentEl = el;
                else break;
            }
            
            let currentDate = new Date(currentEl.getAttribute('data-date'));
            currentDate.setMonth(currentDate.getMonth() + direction);
            let targetMonthStr = currentDate.getFullYear() + '-' + String(currentDate.getMonth() + 1).padStart(2, '0');
            
            let targetHeader = null;
            if (direction === 1) {
                targetHeader = dayHeaders.find(el => el.getAttribute('data-date').substring(0, 7) >= targetMonthStr);
            } else {
                let reversed = [...dayHeaders].reverse();
                targetHeader = reversed.find(el => el.getAttribute('data-date').substring(0, 7) <= targetMonthStr);
                if (targetHeader) {
                    let prevMonthStr = targetHeader.getAttribute('data-date').substring(0, 7);
                    targetHeader = dayHeaders.find(el => el.getAttribute('data-date').startsWith(prevMonthStr));
                }
            }
            
            if (targetHeader) targetHeader.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('btn-prev').addEventListener('click', () => currentViewName === 'listYear' ? navigateListMonth(-1) : calendar.prev());
        document.getElementById('btn-next').addEventListener('click', () => currentViewName === 'listYear' ? navigateListMonth(1) : calendar.next());
        
        document.getElementById('btn-today').addEventListener('click', () => {
            if (currentViewName === 'listYear') {
                let target = Array.from(document.querySelectorAll('.fc-list-day')).find(el => el.getAttribute('data-date') >= new Date().toISOString().split('T')[0]);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else calendar.today();
        });

        document.querySelectorAll('.header-left .btn[data-view]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.header-left .btn[data-view]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentViewName = e.target.dataset.view;
                calendar.changeView(currentViewName);
                scrollContainer.scrollTo({top: 0});
            });
        });

        document.getElementById('themeToggle').addEventListener('change', (e) => document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light'));

        fetch('events.json?t=' + new Date().getTime()).then(res => res.json()).then(data => {
            window.allEvents = data;
            if(data.length > 0) {
                let min = data.reduce((a, b) => a.start < b.start ? a : b).start.split('T')[0];
                let max = data.reduce((a, b) => a.start > b.start ? a : b).start.split('T')[0];
                let today = new Date().toISOString().split('T')[0];
                calendar.setOption('validRange', { start: min < today ? min : today, end: max });
                calendar.gotoDate(min);
            }
            updateCalendar();
        });

        window.updateCalendar = () => {
            const activeLocs = Array.from(document.querySelectorAll('#filter-locations input:checked')).map(el => el.value);
            const activeCats = Array.from(document.querySelectorAll('#filter-categories input:checked')).map(el => el.value);
            
            const filteredEvents = window.allEvents.filter(ev => {
                let ep = ev.extendedProps;
                if (ep.is_glicinias) return activeLocs.includes('cinema') && activeCats.includes('cinema');
                return activeLocs.includes(ev.source) && activeCats.includes(ep.category_normalized);
            });

            calendar.removeAllEvents();
            calendar.addEventSource(filteredEvents);
            calendar.render();
            setTimeout(updateTitleOnScroll, 100);
        };
        
        document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(i => i.addEventListener('change', updateCalendar));
      });
    </script>
</body>
</html>
