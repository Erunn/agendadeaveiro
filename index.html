<!DOCTYPE html>
<html lang="pt" data-theme="brutalist">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Aveiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        /* ========================================================
           SISTEMA DE ESTILOS 
           ======================================================== */

        /* ESTILO 1: CARTAZ IMPRESSO / NEO-BRUTALISMO */
        :root, [data-theme="brutalist"] {
            --sidebar-bg: #F4F0EC;      
            --main-bg: #F4F0EC;
            --text-color: #111111;      
            --text-muted: #444444;
            --card-bg: #ffffff;
            --border-color: #111111;    
            
            --teatro-color: #FF4500;    
            --cinema-color: #0047FF;    
            --cma-color: #00A859;       
            --viral-color: #9D00FF;     

            --font-main: 'Space Grotesk', sans-serif;
            --font-title: 'Space Grotesk', sans-serif;

            --card-radius: 0px;
            --card-border: 2px solid var(--text-color);
            --card-shadow: 6px 6px 0px var(--text-color);
            --card-hover-transform: translate(-3px, -3px);
            --card-hover-shadow: 9px 9px 0px var(--text-color);
            --card-left-width: 16px; 

            --divider: 2px solid var(--text-color);
            --sidebar-border: 3px solid var(--text-color);
            --header-border: 3px solid var(--text-color);

            --btn-border: 2px solid var(--text-color);
            --btn-radius: 0px;
            --btn-shadow: 3px 3px 0px var(--text-color);
            --btn-hover-transform: translate(-2px, -2px);
            --btn-hover-shadow: 5px 5px 0px var(--text-color);
            --toggle-radius: 0px;
        }

        /* ESTILO 2: GALERIA SUÍÇA / ULTRA MINIMAL */
        [data-theme="minimal"] {
            --sidebar-bg: #FFFFFF;      
            --main-bg: #FAFAFA;
            --text-color: #000000;      
            --text-muted: #888888;
            --card-bg: #FFFFFF;
            --border-color: #E5E5E5;    
            
            --teatro-color: #E67E22;    
            --cinema-color: #1E88E5;    
            --cma-color: #2E7D32;       
            --viral-color: #7B1FA2;     

            --font-main: 'Inter', sans-serif;
            --font-title: 'Inter', sans-serif;

            --card-radius: 0px;
            --card-border: 1px solid var(--border-color);
            --card-shadow: none;
            --card-hover-transform: translateX(4px);
            --card-hover-shadow: 0 4px 20px rgba(0,0,0,0.05);
            --card-left-width: 10px;

            --divider: 1px solid var(--border-color);
            --sidebar-border: 1px solid var(--border-color);
            --header-border: 1px solid var(--border-color);

            --btn-border: 1px solid var(--border-color);
            --btn-radius: 20px;
            --btn-shadow: none;
            --btn-hover-transform: translateY(-1px);
            --btn-hover-shadow: 0 2px 8px rgba(0,0,0,0.05);
            --toggle-radius: 20px;
        }

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; font-family: var(--font-main); background: var(--main-bg); 
            color: var(--text-color); display: flex; height: 100vh; overflow: hidden; 
            transition: background 0.3s, color 0.3s;
        }

        h1, h2, h3, .card-title, .custom-date { font-family: var(--font-title); }
        
        /* --- SIDEBAR & TOGGLES --- */
        .sidebar { 
            width: 260px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; 
            flex-direction: column; gap: 30px; color: var(--text-color); z-index: 200; 
            border-right: var(--sidebar-border); 
            flex-shrink: 0; overflow-y: auto; scrollbar-width: none; transition: all 0.3s;
        }
        .sidebar::-webkit-scrollbar { display: none; }
        
        .sidebar h1 { font-size: 1.8rem; margin: 0; text-transform: uppercase; font-weight: 700; border-bottom: var(--divider); padding-bottom: 15px; }
        .sidebar-section h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 0 0 15px 0; font-weight: 700;}
        .filter-group { display: flex; flex-direction: column; gap: 10px; }
        
        .toggle-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase;}
        .toggle-item:hover { opacity: 0.7; }
        .toggle-item input { display: none; }
        
        .toggle-switch { width: 20px; height: 20px; border: var(--btn-border); position: relative; }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; transition: 0.1s; }
        .toggle-item input:checked + .toggle-switch::after { background: var(--text-color); }

        /* --- LAYOUT PRINCIPAL E HEADER --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .custom-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--main-bg); border-bottom: var(--header-border); flex-shrink: 0; }
        
        .header-left, .header-right { display: flex; align-items: center; gap: 12px; width: 250px; }
        .header-right { justify-content: flex-end; }
        .header-center { display: flex; align-items: center; gap: 15px; justify-content: center; flex: 1; }
        .header-center h2 { margin: 0; font-size: 1.6rem; font-weight: 700; text-transform: uppercase; }
        
        .btn, .theme-select { 
            background: var(--card-bg); color: var(--text-color); border: var(--btn-border); border-radius: var(--btn-radius);
            padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px; text-transform: uppercase;
            box-shadow: var(--btn-shadow); font-family: var(--font-main); outline: none;
        }
        .btn:hover, .theme-select:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--text-color); }
        .btn.active { background: var(--text-color); color: var(--main-bg); }
        
        .theme-select { appearance: none; padding-right: 30px; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23111111%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 10px top 50%; background-size: 10px auto; }

        /* --- ZONA DE CONTEÚDO --- */
        .calendar-section { flex: 1; padding: 25px 40px; overflow-y: auto; scroll-behavior: smooth; }
        .fc-header-toolbar { display: none !important; } 
        #calendar { background: transparent; padding: 0; border: none; }
        .fc-view-harness, .fc-view { background: transparent !important; outline: none !important; border: none !important; }

        .fc .fc-list-event-graphic, .fc .fc-list-event-time { display: none !important; }
        .fc .fc-list-table, .fc .fc-list-table td, .fc .fc-list-table th, .fc .fc-list-table tr { border: none !important; background: transparent !important; }
        .fc-list-table, .fc-list-table tbody, .fc-list-table tr, .fc-list-table td { display: block !important; width: 100% !important; } 
        .fc-list-event { margin-bottom: 30px !important; }
        .fc-list-event-title, .fc-list-day-cushion { padding: 0 !important; background: transparent !important;}

        .custom-day-header { display: flex; flex-direction: column; gap: 2px; padding: 20px 0 15px 0; text-align: left; }
        .custom-weekday { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; }
        .custom-date { font-size: 1.5rem; font-weight: 700; color: var(--text-color); letter-spacing: -1px; text-transform: uppercase;}

        /* ========================================================
           A GRELHA EDITORIAL MÁGICA (CSS GRID)
           ======================================================== */
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 16px;
            grid-auto-flow: dense;
        }

        /* Cartão Base Flexível */
        .event-card {
            display: flex; background: var(--card-bg); border: var(--card-border);
            box-shadow: var(--card-shadow); transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none; color: inherit; overflow: hidden;
            min-height: 140px; 
        }
        .event-card:hover { transform: var(--card-hover-transform); box-shadow: var(--card-hover-shadow); }

        /* Tipos de Orientação do Cartão */
        .event-card.horizontal {
            flex-direction: row; border-left-width: var(--card-left-width) !important; border-left-style: solid;
        }
        .event-card.vertical {
            flex-direction: column; border-top-width: 8px !important; border-top-style: solid;
        }

        /* Molduras de Imagem */
        .card-img-wrap { overflow: hidden; flex-shrink: 0; }
        
        .event-card.horizontal .card-img-wrap { width: 160px; border-right: var(--divider); }
        .event-card.vertical .card-img-wrap { width: 100%; height: 220px; border-bottom: var(--divider); }
        
        .event-card.row-span-2.vertical .card-img-wrap { height: auto; flex: 1; }
        .event-card.row-span-2.horizontal .card-img-wrap { width: 45%; } 

        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .event-card:hover .card-img { transform: scale(1.05); }

        /* Texto do Cartão */
        .card-info { padding: 15px 20px; display: flex; flex-direction: column; flex: 1; justify-content: center; }
        .card-meta { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px;}
        .card-title { font-size: 1.1rem; font-weight: 700; line-height: 1.25; text-transform: uppercase; margin-bottom: 8px; }
        .card-umbrella { display: inline-block; font-size: 0.8em; margin-bottom: 6px; background: var(--main-bg); padding: 2px 6px; border: var(--btn-border); }
        .card-time { font-size: 0.9rem; font-weight: 600; margin-top: auto; color: var(--text-muted);}

        /* Regras da Grelha */
        .span-12 { grid-column: span 12; }
        .span-6 { grid-column: span 6; }
        .span-4 { grid-column: span 4; }
        .span-3 { grid-column: span 3; }
        .row-span-2 { grid-row: span 2; }
        
        /* Ajuste Mobile */
        @media (max-width: 900px) {
            .span-3, .span-4, .span-6 { grid-column: span 12; }
            .event-card.vertical { flex-direction: row; border-left-width: 12px !important; border-top-width: 0 !important;}
            .event-card.vertical .card-img-wrap { width: 120px; height: auto; border-bottom: none; border-right: var(--divider); }
            .row-span-2 { grid-row: span 1; }
        }

        /* --- MODO CALENDÁRIO (GRID) CORES OMITIDAS --- */
        .fc-dayGridMonth-view .fc-scrollgrid { background: var(--card-bg) !important; border: var(--border-color) !important; box-shadow: var(--card-shadow); border-radius: var(--card-radius);}
        .fc-theme-standard td, .fc-theme-standard th { border: var(--divider) !important; }
        .fc-col-header-cell { padding: 12px 0; font-weight: 700; color: var(--text-color); text-transform: uppercase; border-bottom: none !important; font-size: 0.9rem;}
        .fc-daygrid-day-frame { padding: 5px; }
        .fc-day-past, .fc-day-other, .fc-day-disabled { background-color: rgba(0,0,0,0.05) !important; }
        .fc-daygrid-event { border: var(--divider) !important; cursor: pointer; margin: 2px 4px !important; padding: 3px 6px; font-size: 0.75rem; font-weight: 600; box-shadow: var(--btn-shadow);}
        .event-teatro { background: var(--card-bg) !important; border-left: 6px solid var(--teatro-color) !important; }
        .event-cinema { background: var(--card-bg) !important; border-left: 6px solid var(--cinema-color) !important; }
        .event-cma { background: var(--card-bg) !important; border-left: 6px solid var(--cma-color) !important; }
        .event-viral { background: var(--card-bg) !important; border-left: 6px solid var(--viral-color) !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>AGENDA<br>AVEIRO</h1>
        
        <div class="sidebar-section">
            <h3>Locais</h3>
            <div class="filter-group" id="filter-locations">
                <label class="toggle-item">Teatro Aveirense <input type="checkbox" checked value="teatro"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Cinema Glicínias <input type="checkbox" checked value="cinema"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Município <input type="checkbox" checked value="cma"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Viral Agenda <input type="checkbox" checked value="viral"><div class="toggle-switch"></div></label>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Tipo de Evento</h3>
            <div class="filter-group" id="filter-categories">
                <label class="toggle-item">Cinema <input type="checkbox" checked value="cinema"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Música <input type="checkbox" checked value="música"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Teatro <input type="checkbox" checked value="teatro"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Dança <input type="checkbox" checked value="dança"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Workshop <input type="checkbox" checked value="workshop"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Ópera <input type="checkbox" checked value="ópera"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Multidisciplinar <input type="checkbox" checked value="multidisciplinar"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Festival <input type="checkbox" checked value="festival"><div class="toggle-switch"></div></label>
                <label class="toggle-item">Outros <input type="checkbox" checked value="outros"><div class="toggle-switch"></div></label>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="custom-header">
            <div class="header-left">
                <button class="btn active" id="btn-list" data-view="listYear">Lista</button>
                <button class="btn" id="btn-grid" data-view="dayGridMonth">Grelha</button>
            </div>
            <div class="header-center">
                <button class="btn btn-icon" id="btn-prev">&lt;</button>
                <h2 id="current-month-title">a carregar...</h2>
                <button class="btn btn-icon" id="btn-next">&gt;</button>
            </div>
            <div class="header-right">
                <button class="btn" id="btn-today">Hoje</button>
                <div class="theme-switch-wrapper">
                    <select id="themeSelect" class="theme-select">
                        <option value="brutalist">Estilo 1: Cartaz</option>
                        <option value="minimal">Estilo 2: Galeria</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="calendar-section" id="scroll-container">
            <div id='calendar'></div>
        </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var scrollContainer = document.getElementById('scroll-container');
        var titleEl = document.getElementById('current-month-title');
        window.allEvents = [];
        window.filteredEvents = [];
        let currentViewName = 'listYear';

        const themeSelect = document.getElementById('themeSelect');
        themeSelect.addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.value);
        });

        window.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView: 'listYear', locale: 'pt', firstDay: 1, stickyHeaderDates: false, height: 'auto',
          datesSet: (info) => { 
              if (currentViewName === 'dayGridMonth') titleEl.innerText = info.view.title.toLowerCase();
              else updateTitleOnScroll();
          },
          dayHeaderContent: (arg) => {
              if (arg.view.type === 'listYear') {
                  let weekday = arg.date.toLocaleDateString('pt-PT', { weekday: 'long' });
                  let dayMonthYear = arg.date.toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });
                  return { html: `<div class="custom-day-header"><span class="custom-weekday">${weekday}</span><span class="custom-date">${dayMonthYear}</span></div>` };
              }
          },
          eventContent: function(arg) {
            if (arg.view.type !== 'listYear') {
                let timeText = arg.event.extendedProps.display_time || 'Todo o dia';
                return { html: `<div style="overflow:hidden;"><b>${timeText.split(',')[0]}</b> ${arg.event.title}</div>` };
            }

            let ep = arg.event.extendedProps;
            if (!ep.is_grouped) return; 

            let tEvents = ep.daily_events.filter(e => e.source !== 'cinema');
            let cEvents = ep.daily_events.filter(e => e.source === 'cinema');
            let t = tEvents.length;
            let c = cEvents.length;
            let total = t + c;

            // A ordem em que os eventos são inseridos na grelha
            let renderOrder = (t === 2 && c === 4) ? [...cEvents, ...tEvents] : [...tEvents, ...cEvents];

            // ==========================================
            // NOVAS REGRAS MATEMÁTICAS APLICADAS
            // ==========================================
            if (total === 1) {
                renderOrder[0].gridClass = 'span-12 horizontal';
            } else if (total === 2) {
                // Se forem 2, dividem exatamente a largura ao meio (50/50) e ficam lado a lado
                renderOrder.forEach(e => e.gridClass = 'span-6 horizontal');
            } else if (total === 3) {
                // Se forem 3, dividem exatamente a largura por três (33/33/33)
                renderOrder.forEach(e => e.gridClass = 'span-4 vertical');
            } else if (t === 0 && c === 4) {
                renderOrder.forEach(e => e.gridClass = 'span-3 vertical');
            } else if (t === 0 && c === 5) {
                renderOrder[0].gridClass = 'span-6 row-span-2 horizontal featured';
                for(let i=1; i<5; i++) renderOrder[i].gridClass = 'span-3 vertical';
            } else if (t === 1 && c === 4) {
                renderOrder[0].gridClass = 'span-6 row-span-2 horizontal featured'; 
                for(let i=1; i<5; i++) renderOrder[i].gridClass = 'span-3 vertical';
            } else if (t === 2 && c === 4) {
                for(let i=0; i<4; i++) renderOrder[i].gridClass = 'span-3 vertical';
                for(let i=4; i<6; i++) renderOrder[i].gridClass = 'span-6 horizontal';
            } else {
                // Fallback para qualquer outro número bizarro de eventos
                tEvents.forEach(e => e.gridClass = 'span-6 horizontal');
                cEvents.forEach(e => e.gridClass = 'span-3 vertical');
            }

            let html = '<div class="daily-grid">';
            renderOrder.forEach(e => {
                let p = e.extendedProps || e;
                let umbrellaHtml = p.umbrella ? `<div class="card-umbrella">${p.umbrella}</div>` : '';
                
                html += `
                <a href="${e.url}" target="_blank" class="event-card ${e.gridClass}" style="border-color: var(--${e.source}-color);">
                    <div class="card-img-wrap">
                        <img src="${p.image}" class="card-img">
                    </div>
                    <div class="card-info">
                        <div class="card-meta">${p.category || 'Geral'}</div>
                        ${umbrellaHtml}
                        <div class="card-title">${e.title}</div>
                        <div class="card-time">${p.display_time || 'Todo o dia'}</div>
                    </div>
                </a>`;
            });
            html += '</div>';

            return { html: html };
          },
          eventClassNames: (arg) => ['event-' + (arg.event.extendedProps.source || 'geral')]
        });

        function updateTitleOnScroll() {
            if(currentViewName !== 'listYear') return;
            let dayHeaders = document.querySelectorAll('.fc-list-day');
            let containerTop = scrollContainer.getBoundingClientRect().top;
            let currentEl = dayHeaders[0];
            for (let el of dayHeaders) {
                if (el.getBoundingClientRect().top <= containerTop + 100) currentEl = el;
                else break;
            }
            if(currentEl && currentEl.getAttribute('data-date')) {
                titleEl.innerText = new Date(currentEl.getAttribute('data-date')).toLocaleString('pt-PT', { month: 'long', year: 'numeric' });
            }
        }
        scrollContainer.addEventListener('scroll', updateTitleOnScroll);

        function navigateListMonth(direction) {
            let dayHeaders = Array.from(document.querySelectorAll('.fc-list-day'));
            if (!dayHeaders.length) return;
            
            let containerTop = scrollContainer.getBoundingClientRect().top;
            let currentEl = dayHeaders[0];
            for (let el of dayHeaders) {
                if (el.getBoundingClientRect().top <= containerTop + 100) currentEl = el;
                else break;
            }
            
            let currentDate = new Date(currentEl.getAttribute('data-date'));
            currentDate.setMonth(currentDate.getMonth() + direction);
            let targetMonthStr = currentDate.getFullYear() + '-' + String(currentDate.getMonth() + 1).padStart(2, '0');
            
            let targetHeader = null;
            if (direction === 1) {
                targetHeader = dayHeaders.find(el => el.getAttribute('data-date').substring(0, 7) >= targetMonthStr);
            } else {
                let reversed = [...dayHeaders].reverse();
                targetHeader = reversed.find(el => el.getAttribute('data-date').substring(0, 7) <= targetMonthStr);
                if (targetHeader) {
                    let prevMonthStr = targetHeader.getAttribute('data-date').substring(0, 7);
                    targetHeader = dayHeaders.find(el => el.getAttribute('data-date').startsWith(prevMonthStr));
                }
            }
            if (targetHeader) targetHeader.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('btn-prev').addEventListener('click', () => currentViewName === 'listYear' ? navigateListMonth(-1) : calendar.prev());
        document.getElementById('btn-next').addEventListener('click', () => currentViewName === 'listYear' ? navigateListMonth(1) : calendar.next());
        
        document.getElementById('btn-today').addEventListener('click', () => {
            if (currentViewName === 'listYear') {
                let target = Array.from(document.querySelectorAll('.fc-list-day')).find(el => el.getAttribute('data-date') >= new Date().toISOString().split('T')[0]);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else calendar.today();
        });

        document.querySelectorAll('.header-left .btn[data-view]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.header-left .btn[data-view]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentViewName = e.target.dataset.view;
                calendar.changeView(currentViewName);
                updateCalendar();
                scrollContainer.scrollTo({top: 0});
            });
        });

        fetch('events.json?t=' + new Date().getTime()).then(res => res.json()).then(data => {
            window.allEvents = data;
            if(data.length > 0) {
                let min = data.reduce((a, b) => a.start < b.start ? a : b).start.split('T')[0];
                let max = data.reduce((a, b) => a.start > b.start ? a : b).start.split('T')[0];
                let today = new Date().toISOString().split('T')[0];
                calendar.setOption('validRange', { start: min < today ? min : today, end: max });
                calendar.gotoDate(min);
            }
            updateCalendar();
        });

        window.updateCalendar = () => {
            const activeLocs = Array.from(document.querySelectorAll('#filter-locations input:checked')).map(el => el.value);
            const activeCats = Array.from(document.querySelectorAll('#filter-categories input:checked')).map(el => el.value);
            
            window.filteredEvents = window.allEvents.filter(ev => {
                let ep = ev.extendedProps || ev;
                let cat = ep.category_normalized || 'outros';
                return activeLocs.includes(ev.source) && activeCats.includes(cat);
            });

            let finalRenderData = [];

            if (currentViewName === 'dayGridMonth') {
                finalRenderData = window.filteredEvents;
            } else {
                let grouped = {};
                window.filteredEvents.forEach(ev => {
                    let d = ev.start.split('T')[0];
                    if(!grouped[d]) grouped[d] = [];
                    grouped[d].push(ev);
                });
                for (let d in grouped) {
                    finalRenderData.push({
                        start: d, title: "Dia Agrupado",
                        extendedProps: { is_grouped: true, daily_events: grouped[d] }
                    });
                }
            }

            calendar.removeAllEvents();
            calendar.addEventSource(finalRenderData);
            calendar.render();
            setTimeout(updateTitleOnScroll, 100);
        };
        
        document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(i => i.addEventListener('change', updateCalendar));
      });
    </script>
</body>
</html>
